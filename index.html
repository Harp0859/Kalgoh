<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/kalgoh-logo.png" />
    <link rel="apple-touch-icon" href="/kalgoh-logo.png" />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e8e5df" />
    <title>Kalgoh - MT5 Trading Dashboard</title>
    <script>
      // Apply theme before paint to avoid flash. Must stay in sync
      // with the STORAGE_KEY / THEME_COLORS in src/theme/ThemeContext.jsx.
      (function () {
        try {
          var stored = localStorage.getItem('kalgoh:theme');
          var pref = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var resolved = pref === 'dark' || (pref === 'system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
            ? 'dark'
            : 'light';
          document.documentElement.dataset.theme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0a0a0a' : '#e8e5df');
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
